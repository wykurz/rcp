<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="remote-architecture-title remote-architecture-desc">
  <title id="remote-architecture-title">Remote copy network architecture</title>
  <desc id="remote-architecture-desc">Master uses SSH to start source and destination rcpd. Each Master-to-rcpd leg has two distinct TCP connections: bidirectional control and one-way tracing and progress from rcpd to master. Source and destination also use bidirectional control and pooled one-way file data. TLS 1.3 protects all rcp TCP connections by default.</desc>
  <!-- Three-node remote copy architecture: master (rcp) + source/destination (rcpd). -->
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#475569"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="799" height="519" rx="8" fill="#ffffff" stroke="#d0d7de"/>

  <!-- master node -->
  <rect x="310" y="24" width="180" height="56" rx="8" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="48" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Master (rcp)</text>
  <text x="400" y="68" text-anchor="middle" font-size="12" fill="#475569">user's machine</text>

  <!-- source node -->
  <rect x="45" y="294" width="210" height="58" rx="8" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="150" y="319" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Source (rcpd)</text>
  <text x="150" y="339" text-anchor="middle" font-size="12" fill="#475569">reads and sends files</text>

  <!-- destination node -->
  <rect x="545" y="294" width="210" height="58" rx="8" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="650" y="319" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Destination (rcpd)</text>
  <text x="650" y="339" text-anchor="middle" font-size="12" fill="#475569">receives and writes files</text>

  <!-- master/source: SSH plus two distinct rcp TCP connections -->
  <line x1="330" y1="80" x2="88" y2="292" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4" marker-start="url(#arrow-violet)" marker-end="url(#arrow-violet)"/>
  <line x1="370" y1="80" x2="150" y2="292" stroke="#475569" stroke-width="1.7" marker-start="url(#arrow-slate)" marker-end="url(#arrow-slate)"/>
  <line x1="212" y1="292" x2="390" y2="80" stroke="#b45309" stroke-width="1.7" marker-end="url(#arrow-amber)"/>
  <g font-size="12.5">
    <text x="20" y="116" fill="#7c3aed">SSH bootstrap ↔</text>
    <text x="20" y="170" fill="#475569">control: master ↔ rcpd</text>
    <text x="20" y="224" fill="#b45309">tracing/progress: rcpd → master</text>
  </g>

  <!-- master/destination: SSH plus two distinct rcp TCP connections -->
  <line x1="470" y1="80" x2="712" y2="292" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4" marker-start="url(#arrow-violet)" marker-end="url(#arrow-violet)"/>
  <line x1="430" y1="80" x2="650" y2="292" stroke="#475569" stroke-width="1.7" marker-start="url(#arrow-slate)" marker-end="url(#arrow-slate)"/>
  <line x1="588" y1="292" x2="410" y2="80" stroke="#b45309" stroke-width="1.7" marker-end="url(#arrow-amber)"/>
  <g font-size="12.5" text-anchor="end">
    <text x="780" y="116" fill="#7c3aed">SSH bootstrap ↔</text>
    <text x="780" y="170" fill="#475569">control: master ↔ rcpd</text>
    <text x="780" y="224" fill="#b45309">tracing/progress: rcpd → master</text>
  </g>

  <!-- destination connects to both source listeners; control and data are distinct -->
  <text x="400" y="300" text-anchor="middle" font-size="12.5" fill="#2563eb" font-weight="600">control (bidirectional)</text>
  <line x1="257" y1="314" x2="543" y2="314" stroke="#2563eb" stroke-width="2" marker-start="url(#arrow-blue)" marker-end="url(#arrow-blue)"/>
  <line x1="257" y1="340" x2="543" y2="340" stroke="#0f766e" stroke-width="2.5" marker-end="url(#arrow-teal)"/>
  <text x="400" y="373" text-anchor="middle" font-size="12.5" fill="#0f766e" font-weight="600">pooled data: source → destination</text>

  <text x="400" y="403" text-anchor="middle" font-size="12" fill="#475569">Destination connects to the source's control and data listeners.</text>
  <text x="400" y="426" text-anchor="middle" font-size="11.5" fill="#475569">File data flows source → destination and never passes through master.</text>
  <text x="400" y="451" text-anchor="middle" font-size="11.5" fill="#475569">By default, all rcp TCP connections use TLS 1.3 with certificate-fingerprint pinning.</text>
  <text x="400" y="477" text-anchor="middle" font-size="11.5" fill="#475569">--no-encryption disables TLS and certificate authentication on every rcp TCP connection;</text>
  <text x="400" y="497" text-anchor="middle" font-size="11.5" font-weight="600" fill="#475569">SSH remains protected.</text>
</svg>
