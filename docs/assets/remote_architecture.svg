<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Three-node remote copy architecture: master (rcp) + source/destination (rcpd). -->
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#475569"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="429" rx="8" fill="#ffffff" stroke="#d0d7de"/>

  <!-- master node -->
  <rect x="290" y="28" width="180" height="52" rx="8" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="380" y="50" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Master (rcp)</text>
  <text x="380" y="68" text-anchor="middle" font-size="12" fill="#64748b">user's machine</text>

  <!-- source node -->
  <rect x="60" y="290" width="190" height="52" rx="8" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="155" y="312" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Source (rcpd)</text>
  <text x="155" y="330" text-anchor="middle" font-size="12" fill="#64748b">reads and sends files</text>

  <!-- destination node -->
  <rect x="510" y="290" width="190" height="52" rx="8" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="605" y="312" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Destination (rcpd)</text>
  <text x="605" y="330" text-anchor="middle" font-size="12" fill="#64748b">receives and writes files</text>

  <!-- master to source: SSH (dashed violet) + TLS control (solid slate) -->
  <line x1="322" y1="80" x2="172" y2="288" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-violet)"/>
  <line x1="352" y1="80" x2="202" y2="288" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="200" y="160" text-anchor="end" font-size="12.5" fill="#7c3aed">SSH: spawn rcpd,</text>
  <text x="200" y="176" text-anchor="end" font-size="12.5" fill="#7c3aed">read cert fingerprint</text>
  <text x="216" y="212" text-anchor="end" font-size="12.5" fill="#475569">TLS 1.3: control +</text>
  <text x="216" y="228" text-anchor="end" font-size="12.5" fill="#475569">tracing/progress</text>

  <!-- master to destination: SSH + TLS control -->
  <line x1="438" y1="80" x2="588" y2="288" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-violet)"/>
  <line x1="408" y1="80" x2="558" y2="288" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="560" y="160" text-anchor="start" font-size="12.5" fill="#7c3aed">SSH: spawn rcpd,</text>
  <text x="560" y="176" text-anchor="start" font-size="12.5" fill="#7c3aed">read cert fingerprint</text>
  <text x="544" y="212" text-anchor="start" font-size="12.5" fill="#475569">TLS 1.3: control +</text>
  <text x="544" y="228" text-anchor="start" font-size="12.5" fill="#475569">tracing/progress</text>

  <!-- source <-> destination: destination connects to source's control + data ports -->
  <line x1="508" y1="316" x2="254" y2="316" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="380" y="276" text-anchor="middle" font-size="12.5" fill="#2563eb" font-weight="600">TLS 1.3: control port + pooled data connections</text>
  <text x="380" y="362" text-anchor="middle" font-size="12" fill="#64748b">destination connects to source's listeners;</text>
  <text x="380" y="378" text-anchor="middle" font-size="12" fill="#64748b">file data flows source → destination, never through the master</text>

  <!-- legend -->
  <text x="380" y="410" text-anchor="middle" font-size="11.5" fill="#94a3b8">all TCP connections are TLS 1.3 with mutual certificate-fingerprint pinning (SSH bootstraps trust)</text>
</svg>
