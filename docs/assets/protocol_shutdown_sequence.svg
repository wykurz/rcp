<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="shutdown-sequence-title shutdown-sequence-desc">
  <title id="shutdown-sequence-title">Graceful remote-copy shutdown sequence</title>
  <desc id="shutdown-sequence-desc">DestinationDone triggers source shutdown. The source cancels the data pool, drains file tasks, closes its control send side, and joins its control-receive task. Data-stream and source control EOF are unordered closure effects with no guaranteed ordering. For each destination data worker, the current handler ends on EOF and the worker exits after reconnect fails. In the data-completed path the destination control receiver observes source EOF; in the control-completed path that receiver has already exited.</desc>
  <!-- Section 6.1 Shutdown Sequence: DestinationDone is the shutdown trigger -->
  <defs>
    <marker id="ar-ctl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#334155"/>
    </marker>
    <marker id="ar-eof" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="999" height="519" rx="8" fill="#ffffff" stroke="#d0d7de"/>

  <rect x="165" y="16" width="190" height="38" rx="7" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="260" y="41" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1e293b">Source (rcpd)</text>
  <rect x="645" y="16" width="190" height="38" rx="7" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="740" y="41" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1e293b">Destination (rcpd)</text>

  <line x1="260" y1="54" x2="260" y2="344" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="740" y1="54" x2="740" y2="344" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>

  <text x="754" y="80" text-anchor="start" font-size="12.5" fill="#64748b">completion conditions met</text>
  <line x1="740" y1="106" x2="266" y2="106" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="500" y="100" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">DestinationDone</text>
  <text x="754" y="124" text-anchor="start" font-size="12.5" fill="#64748b">sender closes control send side</text>
  <text x="500" y="148" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1e293b">DestinationDone triggers source shutdown</text>

  <rect x="62" y="160" width="310" height="96" rx="7" fill="#f8fafc" stroke="#64748b"/>
  <g font-size="12.5" fill="#475569">
    <text x="217" y="181" text-anchor="middle" font-weight="600">Source shutdown actions</text>
    <text x="217" y="198" text-anchor="middle">cancel the pooled-data shutdown token</text>
    <text x="217" y="215" text-anchor="middle">drain file-send tasks; close control send</text>
    <text x="217" y="232" text-anchor="middle">then join the control-receive task</text>
    <text x="217" y="249" text-anchor="middle" font-style="italic">does not wait for control EOF to start shutdown</text>
  </g>

  <text x="500" y="276" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">unordered closure effects — no guaranteed ordering</text>
  <line x1="260" y1="302" x2="734" y2="302" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-eof)"/>
  <text x="500" y="296" text-anchor="middle" font-size="12.5" font-style="italic" fill="#64748b">data-stream EOF (unordered)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="754" y="298" text-anchor="start">current handler ends on EOF</text>
    <text x="754" y="314" text-anchor="start">worker exits after reconnect fails</text>
  </g>

  <line x1="260" y1="338" x2="734" y2="338" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-eof)"/>
  <text x="500" y="332" text-anchor="middle" font-size="12.5" font-style="italic" fill="#64748b">source control EOF (unordered; path-dependent)</text>

  <rect x="25" y="360" width="460" height="100" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <g font-size="12.5" fill="#334155">
    <text x="255" y="384" text-anchor="middle" font-size="13.5" font-weight="600">data-completed path</text>
    <text x="255" y="405" text-anchor="middle">the final data worker sends DestinationDone</text>
    <text x="255" y="424" text-anchor="middle">destination's control receiver remains active</text>
    <text x="255" y="443" text-anchor="middle">and later observes source control EOF</text>
  </g>

  <rect x="515" y="360" width="460" height="100" rx="8" fill="#f0fdfa" stroke="#0f766e"/>
  <g font-size="12.5" fill="#334155">
    <text x="745" y="384" text-anchor="middle" font-size="13.5" font-weight="600">control-completed path</text>
    <text x="745" y="405" text-anchor="middle">the control receiver sends DestinationDone</text>
    <text x="745" y="424" text-anchor="middle">then closes its send side and exits</text>
    <text x="745" y="443" text-anchor="middle">without observing source control EOF</text>
  </g>

  <text x="500" y="486" text-anchor="middle" font-size="12.5" fill="#475569">Data lifecycle: current handler ends on EOF; worker exits after reconnect fails.</text>
  <text x="500" y="506" text-anchor="middle" font-size="12" fill="#475569">Data/control EOF have no guaranteed ordering; no SourceDone or universal final close is required.</text>
</svg>
