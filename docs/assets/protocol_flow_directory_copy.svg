<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 990" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="directory-copy-title directory-copy-desc">
  <title id="directory-copy-title">Five-entry directory copy with bottom-up completion</title>
  <desc id="directory-copy-desc">The source root has five entries while the reused destination initially contains only matching f2. With --overwrite enabled and the reused root within --overwrite-manifest-max-entries, the destination sends a manifest chunk containing f2, acknowledges each directory immediately, and completes the root bottom-up. A data worker sends DestinationDone and the source shuts down its data pool. Destination data-stream handlers end on EOF; workers exit after reconnect fails.</desc>
  <!-- Section 4.1 Directory Copy Flow: root {f1, f2, link, child1 {f1}, child2 {}} -->
  <defs>
    <marker id="ar-ctl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#334155"/>
    </marker>
    <marker id="ar-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2563eb"/>
    </marker>
    <marker id="ar-opt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="999" height="989" rx="8" fill="#ffffff" stroke="#d0d7de"/>

  <!-- participants -->
  <rect x="185" y="16" width="170" height="36" rx="7" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="270" y="39" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1e293b">Source (rcpd)</text>
  <rect x="615" y="16" width="170" height="36" rx="7" fill="#eef2f7" stroke="#475569" stroke-width="1.5"/>
  <text x="700" y="39" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1e293b">Destination (rcpd)</text>

  <!-- lifelines -->
  <line x1="270" y1="52" x2="270" y2="850" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="700" y1="52" x2="700" y2="850" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Pass 1: each Directory receives its response immediately -->
  <g font-size="12.5" fill="#64748b">
    <text x="258" y="78" text-anchor="end">pre-read root: 2 files, 1 symlink,</text>
    <text x="258" y="94" text-anchor="end">2 dirs = 5 entries; retain root</text>
    <text x="258" y="110" text-anchor="end">file_count=2 source-side</text>
    <text x="712" y="82" text-anchor="start">pooled data connections already open</text>
  </g>

  <line x1="270" y1="134" x2="694" y2="134" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="128" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">Directory(root, entries=5, meta)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="712" y="130" text-anchor="start">reuse root, store metadata,</text>
    <text x="712" y="146" text-anchor="start">entries_expected=5</text>
  </g>

  <line x1="700" y1="178" x2="276" y2="178" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-opt)"/>
  <text x="485" y="172" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#64748b">DirectoryManifestChunk(root, entries=[f2])</text>
  <g font-size="12.5" fill="#64748b" font-style="italic">
    <text x="712" y="174" text-anchor="start">one or more chunks including f2;</text>
    <text x="712" y="190" text-anchor="start">all precede the FIFO trigger</text>
  </g>

  <line x1="700" y1="220" x2="276" y2="220" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="214" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">DirectoryCreated(root)</text>
  <text x="712" y="224" text-anchor="start" font-size="12.5" fill="#64748b" font-style="italic">immediate trigger; no count echoed</text>

  <line x1="270" y1="260" x2="694" y2="260" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="254" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">Symlink(root/link, meta)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="712" y="256" text-anchor="start">create symlink</text>
    <text x="712" y="272" text-anchor="start">root: entries_processed++ (1/5)</text>
  </g>

  <g font-size="12.5" fill="#64748b">
    <text x="258" y="302" text-anchor="end">pre-read child1: 1 file = 1 entry;</text>
    <text x="258" y="318" text-anchor="end">retain child1 file_count=1</text>
  </g>
  <line x1="270" y1="340" x2="694" y2="340" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="334" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">Directory(child1, entries=1, meta)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="712" y="336" text-anchor="start">create child1, store metadata,</text>
    <text x="712" y="352" text-anchor="start">entries_expected=1</text>
  </g>

  <line x1="700" y1="382" x2="276" y2="382" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="376" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">DirectoryCreated(child1)</text>
  <text x="712" y="386" text-anchor="start" font-size="12.5" fill="#64748b" font-style="italic">immediate Pass-2 trigger</text>

  <g font-size="12.5" fill="#64748b">
    <text x="258" y="410" text-anchor="end">pre-read child2: 0 entries;</text>
    <text x="258" y="426" text-anchor="end">retain child2 file_count=0</text>
  </g>
  <line x1="270" y1="448" x2="694" y2="448" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="442" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">Directory(child2, entries=0, meta)</text>
  <text x="712" y="452" text-anchor="start" font-size="12.5" fill="#64748b">create child2, entries_expected=0</text>

  <line x1="700" y1="492" x2="276" y2="492" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="486" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">DirectoryCreated(child2)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="712" y="496" text-anchor="start" font-style="italic">immediate trigger</text>
    <text x="712" y="516" text-anchor="start">child2 completes → apply metadata;</text>
    <text x="712" y="532" text-anchor="start">notify root (2/5)</text>
  </g>

  <line x1="270" y1="566" x2="694" y2="566" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="560" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">DirStructureComplete</text>
  <text x="712" y="570" text-anchor="start" font-size="12.5" fill="#64748b">structure complete</text>

  <!-- Pass 2: file contents use the already-open pool -->
  <g font-size="12.5" fill="#64748b">
    <text x="258" y="598" text-anchor="end">look up retained root file_count=2;</text>
    <text x="258" y="614" text-anchor="end">compare f1, f2 with manifest</text>
  </g>
  <line x1="270" y1="638" x2="694" y2="638" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar-data)"/>
  <text x="485" y="632" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2563eb">File(root/f1)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="712" y="634" text-anchor="start">write on existing pooled connection</text>
    <text x="712" y="650" text-anchor="start">root: entries_processed++ (3/5)</text>
  </g>

  <line x1="270" y1="684" x2="694" y2="684" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="678" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">FileUnchanged(root/f2)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="712" y="680" text-anchor="start">manifest match; no data sent</text>
    <text x="712" y="696" text-anchor="start">root: entries_processed++ (4/5)</text>
  </g>

  <text x="258" y="724" text-anchor="end" font-size="12.5" fill="#64748b">send child1's retained file</text>
  <line x1="270" y1="746" x2="694" y2="746" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar-data)"/>
  <text x="485" y="740" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2563eb">File(child1/f1)</text>
  <g font-size="12.5" fill="#64748b">
    <text x="712" y="742" text-anchor="start">child1: entries_processed++ (1/1)</text>
    <text x="712" y="758" text-anchor="start">child1 completes → apply metadata;</text>
    <text x="712" y="774" text-anchor="start">notify root (5/5)</text>
    <text x="712" y="790" text-anchor="start">root completes → apply metadata</text>
  </g>

  <text x="712" y="818" text-anchor="start" font-size="12.5" fill="#64748b">structure and all directories complete</text>
  <line x1="700" y1="842" x2="276" y2="842" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
  <text x="485" y="836" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#334155">DestinationDone</text>
  <text x="712" y="846" text-anchor="start" font-size="12.5" fill="#64748b">data worker sends; closes send side</text>
  <g text-anchor="middle" font-size="12" fill="#64748b">
    <text x="500" y="870">data-completed path: DestinationDone triggers source shutdown</text>
    <text x="500" y="886">handlers end on EOF; workers exit after reconnect fails</text>
    <text x="500" y="902">data/control EOF observations have no guaranteed ordering</text>
  </g>

  <!-- legend -->
  <g font-size="12">
    <line x1="240" y1="922" x2="290" y2="922" stroke="#334155" stroke-width="1.5" marker-end="url(#ar-ctl)"/>
    <text x="298" y="926" fill="#475569">control stream (FIFO)</text>
    <line x1="470" y1="922" x2="520" y2="922" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ar-data)"/>
    <text x="528" y="926" fill="#475569">pooled data connection</text>
    <line x1="700" y1="922" x2="750" y2="922" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ar-opt)"/>
    <text x="758" y="926" fill="#475569">manifest chunk(s)</text>
  </g>
  <text x="500" y="954" text-anchor="middle" font-size="11.5" fill="#64748b">source root: f1, f2, link, child1, child2; reused destination initially has only matching f2</text>
  <text x="500" y="974" text-anchor="middle" font-size="11.5" fill="#64748b">manifest active: --overwrite enabled; reused root within --overwrite-manifest-max-entries</text>
</svg>
