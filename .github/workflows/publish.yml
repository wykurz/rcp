name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., v0.28.0)'
        required: true
      dry-run:
        description: 'Perform a dry run (no actual publishing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    uses: ./.github/workflows/validate.yml
    with:
      ref: ${{ inputs.release_tag }}

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Verify version matches release tag
        run: |
          TAG_VERSION="${{ inputs.release_tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --version 0.4.2 --locked

      - name: Set publish flags
        run: |
          if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            echo "DRY_RUN=--dry-run" >> $GITHUB_ENV
            echo "Running in DRY-RUN mode"
          else
            echo "DRY_RUN=" >> $GITHUB_ENV
            echo "Running in PUBLISH mode"
          fi

      - name: Publish to crates.io
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # --no-verify skips the verification build step which would fail because
          # .cargo/config.toml sets musl as the default target and the musl linker
          # isn't available in this environment. The validate job already verified
          # the build, so this is safe.
          cargo workspaces publish \
            --publish-as-is \
            --yes \
            --no-verify \
            ${{ env.DRY_RUN }}

      - name: Summary
        if: always()
        run: |
          echo "## Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.publish.outcome }}" != "success" ]; then
            echo "❌ crates.io publication failed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ env.DRY_RUN }}" = "--dry-run" ]; then
            echo "✅ Dry-run completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No packages were actually published to crates.io" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following packages would have been published:" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All workspace packages published to crates.io" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Published packages:" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cargo workspaces list --all >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
